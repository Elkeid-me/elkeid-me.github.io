title: Elkeid's site
subtitle: ''
description:
keywords:
author: 喵喵喵？
language: zh-CN
timezone: Asia/Shanghai

url: https://elkeid-me.github.io
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true

syntax_highlighter: prismjs
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

markdown:
  plugins:
    - markdown-it-task-lists
    - markdown-it-footnote
    - markdown-it-cjk-breaks
  images:
    post_asset: true
  render:
    quotes: '""'''''

index_generator:
  path: ''
  per_page: 10
  order_by: -date

default_category: uncategorized
category_map:
tag_map:

meta_generator: true

date_format: YYYY-MM-DD
time_format: HH:mm:ss

updated_option: 'mtime'

per_page: 25
pagination_dir: page

include:
exclude:
ignore:

theme: yun
